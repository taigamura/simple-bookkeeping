document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

  <script type="__bundler/template">
"<!DOCTYPE html>\n<html><head>\n<meta charset=\"utf-8\">\n<meta name=\"viewport\" content=\"width=device-width, initial-scale=1\">\n<script src=\"1e646d34-cf9f-4bdd-b5e9-066235734d25\"><\u002Fscript>\n\n<\u002Fhead>\n<body>\n<x-dc>\n<helmet data-dc-atomics=\"\">\n<style>\nbody{margin:0;background:#C9CDD2;font-family:-apple-system,system-ui,sans-serif;display:flex;justify-content:center;padding:40px 0}\n<\u002Fstyle>\n<\u002Fhelmet>\n\n<x-import component-from-global-scope=\"IOSDevice\" from=\"3103ebdf-c581-4031-b39a-b1450e579b8d#/ios-frame.jsx\" dark=\"{{ isDark }}\" hint-size=\"402px,874px\">\n<div style=\"{{ rootStyle }}\">\n\n  <!-- ================= CALENDAR SCREEN ================= -->\n  <sc-if value=\"{{ isCalendar }}\" hint-placeholder-val=\"{{ true }}\">\n  <div style=\"position:absolute;inset:0;display:flex;flex-direction:column;padding:52px 0 0;box-sizing:border-box\">\n    <div style=\"display:flex;align-items:center;justify-content:space-between;padding:12px 22px 2px\">\n      <span style=\"font:700 24px/1 -apple-system,system-ui;color:var(--ink);letter-spacing:-.02em\">{{ monthLabel }}<\u002Fspan>\n      <div style=\"display:flex;gap:6px\">\n        <div onclick=\"{{ prevMonth }}\" style=\"width:34px;height:34px;border-radius:999px;background:var(--card);display:flex;align-items:center;justify-content:center;color:var(--muted);font:500 17px/1 -apple-system,system-ui;cursor:pointer\">‹<\u002Fdiv>\n        <div onclick=\"{{ nextMonth }}\" style=\"width:34px;height:34px;border-radius:999px;background:var(--card);display:flex;align-items:center;justify-content:center;color:var(--muted);font:500 17px/1 -apple-system,system-ui;cursor:pointer\">›<\u002Fdiv>\n        <div onclick=\"{{ openSettings }}\" style=\"width:34px;height:34px;border-radius:999px;background:var(--card);display:flex;align-items:center;justify-content:center;color:var(--muted);font:400 16px/1 -apple-system,system-ui;cursor:pointer\">⚙<\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <di -content:space-between;padding:16px 22px 6px\">\n        <span style=\"font:600 10.5px/1 ui-monospace,'SF Mono',Menlo,monospace;color:var(--muted);letter-spacing:.12em;text-transform:uppercase\">{{ selectedLabel }}<\u002Fspan>\n        <span style=\"{{ selectedNetStyle }}\">{{ selectedNetStr }}<\u002Fspan>\n      <\u002Fdiv>\n      <sc-if value=\"{{ hasDayEntries }}\" hint-placeholder-val=\"{{ true }}\">\n        <div style=\"margin:0 18px 18px;background:var(--card);border-radius:18px;padding:2px 16px\">\n          <sc-for list=\"{{ dayEntries }}\" as=\"e\" hint-placeholder-count=\"3\">\n            <div style=\"{{ e.rowStyle }}\">\n              <div style=\"width:34px;height:34px;border-radius:10px;background:var(--bg);display:flex;align-items:center;justify-content:center;font:600 11px/1 ui-monospace,'SF Mono',Menlo,monospace;color:var(--muted)\">{{ e.code }}<\u002Fdiv>\n              <div style=\"flex:1\"><div style=\"font:600 14.5px/1 -apple-system,system-ui;color:var(--ink)\">{{ e.category }}<\u002Fdiv><div style=\"margin-top:4px;font:500 12px/1 -apple-system,system-ui;color:var(--muted)\">{{ e.note }}<\u002Fdiv><\u002Fdiv>\n              <span style=\"{{ e.amtStyle }}\">{{ e.amtStr }}<\u002Fspan>\n            <\u002Fdiv>\n          <\u002Fsc-for>\n        <\u002Fdiv>\n      <\u002Fsc-if>\n      <sc-if value=\"{{ noDayEntries }}\" hint-placeholder-val=\"{{ false }}\">\n        <div style=\"margin:0 22px;text-align:center;padding:28px 0;color:var(--dim);font:500 13px/1.4 -apple-system,system-ui\">No entries this day.<br>Tap ＋ to add one.<\u002Fdiv>\n      <\u002Fsc-if>\n      <div style=\"height:98px\"><\u002Fdiv>\n      <sc-if value=\"{{ showAds }}\" hint-placeholder-val=\"{{ true }}\"><div style=\"height:72px\"><\u002Fdiv><\u002Fsc-if>\n    <\u002Fdiv>\n  <\u002Fdiv>\n  <\u002Fsc-if>\n\n  <!-- ================= SUMMARY SCREEN ================= -->\n  <sc-if value=\"{{ isSummary }}\" hint-placeholder-val=\"{{ false }}\">\n  <div style=\"position:absolute;inse nd:var(--card2);display:flex;align-items:center;justify-content:center;font:600 10px/1 ui-monospace,'SF Mono',Menlo,monospace;color:var(--muted);flex:none\">{{ c.code }}<\u002Fdiv>\n            <span style=\"flex:1;font:600 14.5px/1 -apple-system,system-ui;color:var(--ink)\">{{ c.label }}<\u002Fspan>\n            <div onclick=\"{{ c.up }}\" style=\"width:32px;height:32px;border-radius:9px;background:var(--card2);display:flex;align-items:center;justify-content:center;color:var(--muted);font:15px/1 -apple-system,system-ui;cursor:pointer\">↑<\u002Fdiv>\n            <div onclick=\"{{ c.down }}\" style=\"width:32px;height:32px;border-radius:9px;background:var(--card2);display:flex;align-items:center;justify-content:center;color:var(--muted);font:15px/1 -apple-system,system-ui;cursor:pointer\">↓<\u002Fdiv>\n            <div onclick=\"{{ c.remove }}\" style=\"width:32px;height:32px;border-radius:9px;background:var(--card2);display:flex;align-items:center;justify-content:center;color:#F0766C;font:13px/1 -apple-system,system-ui;cursor:pointer\">✕<\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fsc-for>\n      <\u002Fdiv>\n      <div style=\"display:flex;gap:10px;margin-top:12px\">\n        <input value=\"{{ newCat }}\" onchange=\"{{ setNewCat }}\" placeholder=\"New category…\" style=\"flex:1;height:46px;border:1px solid var(--border);border-radius:12px;background:var(--card);color:var(--ink);font:600 14px/1 -apple-system,system-ui;padding:0 16px;outline:none;box-sizing:border-box\">\n        <div onclick=\"{{ addCategory }}\" style=\"flex:none;padding:0 22px;height:46px;border-radius:12px;background:#2BD48A;color:#0B0E12;font:600 14px/1 -apple-system,system-ui;display:flex;align-items:center;justify-content:center;cursor:pointer\">Add<\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n  <\u002Fsc-if>\n\n<\u002Fdiv>\n<\u002Fx-import>\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\" data-props=\"{&quot;$preview&quot;:{&quot;width&quot;:&quot;482px&quo ties' },\n      { id: 15, day: 30, type: 'expense', amount: 3050, category: 'Groceries', note: 'Market' },\n    ],\n  };\n\n  CURRENCIES = [{ symbol: '¥', code: 'JPY' }, { symbol: '$', code: 'USD' }, { symbol: '€', code: 'EUR' }, { symbol: '£', code: 'GBP' }];\n  MONTHS = ['January','February','March','April','May','June','July','August','September','October','November','December'];\n  REPEATS = [['never','Never'],['daily','Every day'],['monthly','Every month'],['yearly','Every year']];\n  WEEKENDS = [['after','Move to Monday'],['before','Move to Friday'],['off','Keep on weekend']];\n  NOTES = { expense: ['—', 'Cash', 'Card', 'Konbini', 'Online'], income: ['—', 'Bank transfer', 'Cash', 'Bonus'] };\n\n  yen(n) { return this.state.currency.symbol + Math.round(n).toLocaleString('en-US'); }\n  signed(n) { return (n > 0 ? '+' : n < 0 ? '−' : '') + this.state.currency.symbol + Math.abs(Math.round(n)).toLocaleString('en-US'); }\n  code(cat) { return cat.slice(0, 2).toUpperCase(); }\n\n  // ---- data helpers (current month) ----\n  monthEntries() {\n    // prototype data lives only in July 2026\n    if (this.state.ym.y === 2026 && this.state.ym.m === 6) return this.state.entries;\n    return [];\n  }\n  dayNet(day) {\n    return this.monthEntries().filter(e => e.day === day)\n      .reduce((s, e) => s + (e.type === 'income' ? e.amount : -e.amount), 0);\n  }\n\n  // ---- navigation ----\n  prevMonth = () => this.setState(s => ({ ym: this.shift(s.ym, -1), selectedDay: 1 }));\n  nextMonth = () => this.setState(s => ({ ym: this.shift(s.ym, 1), selectedDay: 1 }));\n  shift(ym, d) { let m = ym.m + d, y = ym.y; if (m < 0) { m = 11; y--; } if (m > 11) { m = 0; y++; } return { y, m }; }\n  tapDay = (day) => this.setState({ selectedDay: day });\n  goCalendar = () => this.setState({ tab: 'calendar' });\n  goSummary = () => this.setState({ tab: 'summary' });\n  navCalendar = () => this.setState({ entry: null, tab: 'calendar' });\n  navSummary = () => this.setState({ entry: null, tab: 'summary' });\n\n  // ---- entry modal ----\n  openEntry = () => this.setState(s => ({ entry: { type: 'expense', amount: '', category: s.expCats[0], note: '—', day: s.selectedDay, repeat: 'never', weekendShift: 'after' } }));\n  closeEntry = () => this.setState({ entry: null });\n  setType = (t) => this.setState(s => ({ entry: { ...s.entry, type: t, category: (t === 'income' ? s.incCats : s.expCats)[0], note: '—' } }));\n  openSettings = () => this.setState({ settingsOpen: true });\n  closeSettings = () => this.setState({ settingsOpen: false });\n  setTheme = (t) => this.setState({ theme: t });\n  setCurrency = (c) => this.setState({ currency: c });\n  setSettingsType = (t) => this.setState({ settingsType: t });\n  setNewCat = (ev) => this.setState({ newCat: ev.target.value });\n  addCategory = () => this.setState(s => { const key = s.settingsType === 'income' ? 'incCats' : 'expCats'; const n = (s.newCat || '').trim(); if (!n || s[key].includes(n)) return {}; return { [key]: [...s[key], n], newCat: '' }; });\n  removeCategory = (cat) => this.setState(s => { const key = s.settingsType === 'income' ? 'incCats' : 'expCats'; if (s[key].length <= 1) return {}; return { [key]: s[key].filter(c => c !== cat) }; });\n  moveCategory = (idx, dir) => this.setState(s => { const key = s.settingsType === 'income' ? 'incCats' : 'expCats'; const arr = [...s[key]]; const j = idx + dir; if (j < 0 || j >= arr.length) return {}; [arr[idx], arr[j]] = [arr[j], arr[idx]]; return { [key]: arr }; });\n  themeVars() {\n    const dark = { '--bg': '#0E1116', '--card': '#171B22', '--card2': '#1A1F28', '--card3': '#242B35', '--ink': '#EAEEF3', '--muted': '#9AA4B2', '--dim': '#6B7480', '--hair': 'rgba(255,255,255,.06)', '--line': 'rgba(255,255,255,.1)', '--border': 'rgba(255,255,255,.08)' };\n    const light = { '--bg': '#EEF1F5', '--card': '#FFFFFF', '--card2': '#F4F6F8', '--card3': '#E4E9EE', '--ink': '#141820', '--muted': '#5A6472', '--dim': '#98A2AE', '--hair': 'rgba(20,24,31,.07)', '--line': 'rgba(20,24,31,.12)', '--border': 'rgba(20,24,31,.08)' };\n    return this.state.theme === 'light' ? light : dark;\n  }\n  setCategory = (c) => this.setState(s => ({ entry: { ...s.entry, category: c } }));\n  cycleNote = () => this.setState(s => {\n    const list = this.NOTES[s.entry.type]; const i = list.indexOf(s.entry.note);\n    return { entry: { ...s.entry, note: list[(i + 1) % list.length] } };\n  });\n  cycleRepeat = () => this.setState(s => { const k = this.REPEATS.map(r => r[0]); const i = k.indexOf(s.entry.repeat); return { entry: { ...s.entry, repeat: k[(i + 1) % k.length] } }; });\n  cycleWeekend = () => this.setState(s => { const k = this.WEEKENDS.map(r => r[0]); const i = k.indexOf(s.entry.weekendShift); return { entry: { ...s.entry, weekendShift: k[(i + 1) % k.length] } }; });\n  adjustWeekend(day, shift) {\n    if (shift === 'off') return day;\n    const dow = new Date(2026, 6, day).getDay(); let d = day;\n    if (dow === 6) d = shift === 'before' ? day - 1 : day + 2;\n    else if (dow === 0) d = shift === 'before' ? day - 2 : day + 1;\n    return Math.min(Math.max(1, d), new Date(2026, 7, 0).getDate());\n  }\n  press = (k) => this.setState(s => {\n    let a = s.entry.amount;\n    if (k === '⌫') a = a.slice(0, -1);\n    else if (k === '000') a = a === '' ? '' : (a + '000').slice(0, 9);\n    else a = (a + k).replace(/^0+/, '').slice(0, 9);\n    return { entry: { ...s.entry, amount: a } };\n  });\n  save = () => {\n    const e = this.state.entry; const amt = parseInt(e.amount || '0', 10);\n    if (!amt) return;\n    const dim = new Date(2026, 7, 0).getDate();\n    let days = e.repeat === 'daily' ? Array.from({ length: dim }, (_, i) => i + 1) : [e.day];\n    if (e.repeat === 'monthly' || e.repeat === 'yearly') days = days.map(d => this.adjustWeekend(d, e.weekendShift));\n    days = [...new Set(days)];\n    const note = e.note === '—' ? e.category : e.note;\n    const base = Date.now();\n    const added = days.map((day, i) => ({ id: base + i, day, type: e.type, amount: amt, category: e.category, note, repeat: e.repeat }));\n    const landDay = e.repeat === 'daily' ? e.day : days[0];\n    this.setState(s => ({ entries: [...s.entries, ...added], entry: null, tab: 'calendar', selectedDay: landDay, ym: { y: 2026, m: 6 } }));\n  };\n\n  renderVals() {\n    const s = this.state;\n    const green = '#2BD48A', red = '#F0766C', ink = 'var(--ink)', mono = \"ui-monospace,'SF Mono',Menlo,monospace\";\n    const firstDow = new Date(s.ym.y, s.ym.m, 1).getDay();\n    const dim = new Date(s.ym.y, s.ym.m + 1, 0).getDate();\n    const me = this.monthEntries();\n    const income = me.filter(e => e.type === 'income').reduce((a, e) => a + e.amount, 0);\n    const expense = me.filter(e => e.type === 'expense').reduce((a, e) => a + e.amount, 0);\n    const net = income - expense;\n\n    // calendar grid\n    const grid = [];\n    for (let i = 0; i < firstDow; i++) grid.push({ day: '', total: '', wrapStyle: { height: '46px' }, numStyle: {}, totalStyle: {}, onTap: () => {} });\n    for (let d = 1; d <= dim; d++) {\n      const nt = this.dayNet(d); const has = me.some(e => e.day === d);\n      const sel = d === s.selectedDay;\n      grid.push({\n        day: String(d), total: has ? this.signed(nt).replace(this.state.currency.symbol, '') : '',\n        onTap: () => this.tapDay(d),\n        wrapStyle: { height: '46px', display: 'flex', flexDirection: 'column', alignItems: 'center', justifyContent: 'center', gap: '2px', borderRadius: '11px', background: sel ? green : 'transparent', cursor: 'pointer' },\n        numStyle: { font: '600 13px/1 ' + mono, color: sel ? '#0B0E12' : ink },\n        totalStyle: { font: '600 8.5px/1 ' + mono, color: sel ? 'rgba(11,14,18,.7)' : (nt > 0 ? green : nt < 0 ? red : 'transparent'), letterSpacing: '.02em' },\n      });\n    }\n\n    // selected day\n    const selDate = new Date(s.ym.y, s.ym.m, s.selectedDay);\n    const wdFull = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'][selDate.getDay()];\n    const selLabel = wdFull + ', ' + this.MONTHS[s.ym.m].slice(0, 3) + ' ' + s.selectedDay;\n    const selNet = this.dayNet(s.selectedDay);\n    const dayEntries = me.filter(e => e.day === s.selectedDay).map((e, i, arr) => ({\n      code: this.code(e.category), category: e.category, note: e.note,\n      amtStr: (e.type === 'income' ? '+' : '−') + this.yen(e.amount),\n      rowStyle: { display: 'flex', alignItems: 'center', gap: '13px', padding: '13px 0', borderTop: i === 0 ? 'none' : '1px solid var(--hair)' },\n      amtStyle: { font: '600 14px/1 ' + mono, color: e.type === 'income' ? green : red },\n    }));\n\n    // summary — category breakdown (expenses)\n    const catMap = {};\n    me.filter(e => e.type === 'expense').forEach(e => { catMap[e.category] = (catMap[e.category] || 0) + e.amount; });\n    const maxCat = Math.max(1, ...Object.values(catMap));\n    const catBreakdown = Object.entries(catMap).sort((a, b) => b[1] - a[1]).map(([label, amt]) => ({\n      label, amtStr: this.yen(amt),\n      barStyle: { height: '100%', width: (amt / maxCat * 100) + '%', background: green, borderRadius: '5px' },\n    }));\n    const total = Math.max(1, income + expense);\n    const inBarStyle = { width: (income / total * 100) + '%', background: green, height: '100%' };\n    const outBarStyle = { width: (expense / total * 100) + '%', background: red, height: '100%' };\n\n    // tab styling\n    const tabIcon = (on) => ({ font: '18px/1 -apple-system,system-ui', color: on ? green : 'var(--dim)' });\n    const tabLabel = (on) => ({ font: '600 10px/1 -apple-system,system-ui', color: on ? green : 'var(--dim)' });\n\n    // entry modal\n    const e = s.entry;\n    let entryVals = {};\n    if (e) {\n      const catList = e.type === 'income' ? s.incCats : s.expCats;\n      const num = parseInt(e.amount || '0', 10);\n      const disp = this.state.currency.symbol + num.toLocaleString('en-US');\n      const big = disp.length > 8 ? '46px' : disp.length > 6 ? '58px' : '66px';\n      entryVals = {\n        eTypeLabel: e.type === 'income' ? 'Income' : 'Expense',\n        amountDisplay: disp,\n        amountStyle: { margin: '16px 0 0', font: '600 ' + big + \"/1 \" + mono, color: num ? ink : 'var(--dim)', letterSpacing: '-.04em' },\n        expTabStyle: this.pill(e.type === 'expense'),\n        incTabStyle: this.pill(e.type === 'income'),\n        setExpense: () => this.setType('expense'),\n        setIncome: () => this.setType('income'),\n        eCats: catList.map(c => ({ label: c, onTap: () => this.setCategory(c), chipStyle: this.chip(c === e.category) })),\n        noteDisplay: e.note,\n        noteStyle: { font: '600 14px/1 -apple-system,system-ui', color: e.note === '—' ? 'var(--dim)' : ink },\n        repeatDisplay: (this.REPEATS.find(r => r[0] === e.repeat) || [])[1],\n        repeatStyle: { font: '600 14px/1 -apple-system,system-ui', color: e.repeat === 'never' ? 'var(--dim)' : green },\n        showWeekend: e.repeat === 'monthly' || e.repeat === 'yearly',\n        weekendDisplay: (this.WEEKENDS.find(r => r[0] === e.weekendShift) || [])[1],\n        weekendStyle: { font: '600 14px/1 -apple-system,system-ui', color: e.weekendShift === 'off' ? 'var(--dim)' : ink },\n        cycleRepeat: this.cycleRepeat, cycleWeekend: this.cycleWeekend,\n        keys: ['1','2','3','4','5','6','7','8','9','000','0','⌫'].map(k => ({ label: k, onTap: () => this.press(k) })),\n        saveEntry: this.save,\n        saveLabel: (e.type === 'income' ? 'Add income' : 'Add expense'),\n        saveStyle: { flex: '1', height: '54px', borderRadius: '16px', display: 'flex', alignItems: 'center', justifyContent: 'center', font: '600 17px/1 -apple-system,system-ui', cursor: 'pointer', background: num ? green : 'var(--card2)', color: num ? '#0B0E12' : 'var(--dim)', boxShadow: num ? '0 8px 24px rgba(43,212,138,.26)' : 'none' },\n      };\n    }\n\n    // settings view\n    const stype = s.settingsType;\n    const sCats = (stype === 'income' ? s.incCats : s.expCats).map((c, i, arr) => ({\n      label: c, code: this.code(c), canUp: i > 0, canDown: i < arr.length - 1, canRemove: arr.length > 1,\n      up: () => this.moveCategory(i, -1), down: () => this.moveCategory(i, 1), remove: () => this.removeCategory(c),\n      rowStyle: { display: 'flex', alignItems: 'center', gap: '11px', padding: '11px 14px', borderTop: i === 0 ? 'none' : '1px solid var(--hair)' },\n    }));\n    const currencyOpts = this.CURRENCIES.map(c => ({ symbol: c.symbol, code: c.code, onTap: () => this.setCurrency(c), style: this.optBox(c.code === s.currency.code) }));\n\n    return {\n      showAds: !this.props.premium,\n      rootStyle: { position: 'relative', height: '100%', overflow: 'hidden', fontFamily: '-apple-system,system-ui,sans-serif', background: 'var(--bg)', ...this.themeVars() },\n      isDark: s.theme !== 'light',\n      settingsOpen: s.settingsOpen, openSettings: this.openSettings, closeSettings: this.closeSettings,\n      settingsType: stype, sCats, currencyOpts,\n      newCat: s.newCat, setNewCat: this.setNewCat, addCategory: this.addCategory,\n      setSetExp: () => this.setSettingsType('expense'), setSetInc: () => this.setSettingsType('income'),\n      setExpStyle: this.pill(stype === 'expense'), setIncStyle: this.pill(stype === 'income'),\n      themeDark: () => this.setTheme('dark'), themeLight: () => this.setTheme('light'),\n      darkStyle: this.optBox(s.theme === 'dark'), lightStyle: this.optBox(s.theme === 'light'),\n      isCalendar: s.tab === 'calendar', isSummary: s.tab === 'summary',\n      monthLabel: this.MONTHS[s.ym.m] + ' ' + s.ym.y,\n      wd: ['S','M','T','W','T','F','S'], grid,\n      inStr: this.yen(income), outStr: this.yen(expense), netStr: this.signed(net),\n      selectedLabel: selLabel, selectedNetStr: this.signed(selNet),\n      selectedNetStyle: { font: '600 12px/1 ' + mono, color: selNet > 0 ? green : selNet < 0 ? red : '#6B7480' },\n      hasDayEntries: dayEntries.length > 0, noDayEntries: dayEntries.length === 0, dayEntries,\n      catBreakdown, inBarStyle, outBarStyle,\n      calIconStyle: tabIcon(s.tab === 'calendar'), calLabelStyle: tabLabel(s.tab === 'calendar'),\n      sumIconStyle: tabIcon(s.tab === 'summary'), sumLabelStyle: tabLabel(s.tab === 'summary'),\n      goCalendar: this.goCalendar, goSummary: this.goSummary,\n      navCalendar: this.navCalendar, navSummary: this.navSummary,\n      openEntry: this.openEntry, closeEntry: this.closeEntry,\n      prevMonth: this.prevMonth, nextMonth: this.nextMonth,\n      entryOpen: !!e, cycleNote: this.cycleNote,\n      ...entryVals,\n    };\n  }\n\n  pill(active) {\n    return { padding: '8px 16px', borderRadius: '999px', font: '600 13px/1 -apple-system,system-ui', cursor: 'pointer',\n      background: active ? '#2BD48A' : 'transparent', color: active ? '#0B0E12' : 'var(--muted)' };\n  }\n  chip(active) {\n    return { flex: 'none', padding: '9px 15px', borderRadius: '999px', font: '600 13px/1 -apple-system,system-ui', cursor: 'pointer', whiteSpace: 'nowrap',\n      background: active ? 'rgba(43,212,138,.15)' : 'var(--card)', color: active ? '#2BD48A' : 'var(--muted)',\n      boxShadow: active ? 'inset 0 0 0 1px rgba(43,212,138,.4)' : 'none' };\n  }\n  optBox(active) {\n    return { flex: '1', textAlign: 'center', padding: '13px 0', borderRadius: '12px', cursor: 'pointer', font: '600 14px/1 -apple-system,system-ui',\n      background: active ? 'rgba(43,212,138,.15)' : 'var(--card2)', color: active ? '#2BD48A' : 'var(--muted)',\n      boxShadow: active ? 'inset 0 0 0 1.5px rgba(43,212,138,.5)' : 'none' };\n  }\n}\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
  </script>
